<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Used Car Consultancy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
<header class="header">
    <div class="header-brand">
        <a th:href="@{/}" class="brand" th:text="${consultancyName}">Used Car Consultancy</a>

        <span class="header-mobiles"
              th:if="${consultancyMobiles != null && !consultancyMobiles.isEmpty()}">
            <a th:each="mobile : ${consultancyMobiles}"
               th:href="${'tel:+91' + mobile}"
               th:text="${mobile}"
               class="header-tel">
            </a>
        </span>
    </div>

    <nav class="nav-links">
        <a th:href="@{/}" class="nav-link">View site</a>
        <a th:href="@{/admin/new}" class="btn btn-primary nav-link">+ Add car</a>
        <a th:href="@{/logout}" class="nav-link">Logout</a>
    </nav>
</header>

<main class="main">

    <div th:if="${message}" class="alert success" th:text="${message}"></div>

    <h1>Admin Listings</h1>

    <p>
        <a th:href="@{/admin/new}" class="btn btn-primary">+ Add car</a>
    </p>

    <section class="admin-list" th:if="${!cars.isEmpty()}">
        <div th:each="car : ${cars}" class="admin-card">

            <div class="admin-card-img"
                 th:if="${car.images != null && !car.images.isEmpty()}">
                <img th:src="@{/images/{id}(id=${car.images[0].id})}"
                     th:alt="${car.model}" />
            </div>

            <div class="admin-card-img placeholder"
                 th:if="${car.images == null || car.images.isEmpty()}">
            </div>

            <div class="admin-card-body">
                <h3 th:text="${car.model}">Model</h3>
                <p th:text="${car.price}">Price</p>
                <p th:text="${car.proprietorName + ' • ' + car.proprietorMobile}">
                    Proprietor
                </p>

                <div class="admin-actions">
                    <a th:href="@{/admin/edit/{id}(id=${car.id})}" class="btn small">Edit</a>

                    <form th:action="@{/admin/delete/{id}(id=${car.id})}"
                          method="post"
                          class="inline"
                          onsubmit="return confirm('Delete this car?');">
                        <button type="submit" class="btn small danger">Delete</button>
                    </form>
                </div>
            </div>

        </div>
    </section>

    <p class="empty" th:if="${cars.isEmpty()}">
        No cars yet. Add one above.
    </p>

</main>

<footer class="footer">
    <p>Admin: add/edit cars and images.</p>

    <p class="footer-contact"
       th:if="${consultancyMobileDigits != null && !consultancyMobileDigits.isEmpty()}">
        Contact:
        <a th:href="${'https://wa.me/91' + consultancyMobileDigits}"
           target="_blank"
           rel="noopener"
           class="btn btn-whatsapp btn-inline">
            WhatsApp
        </a>

        <a th:href="${'sms:+91' + consultancyMobileDigits}"
           class="btn btn-sms btn-inline">
            SMS
        </a>
    </p>
</footer>

</body>
</html>
